# ============================================================
# Stack Maintenance Prédictive
# ============================================================
# Lancement :
#   docker compose up -d
#
# Accès :
#   - API FastAPI    : http://localhost:8000
#   - MLflow UI      : http://localhost:5000
#   - Prometheus     : http://localhost:9090
#   - Grafana        : http://localhost:3000  (admin/admin)
# ============================================================

services:

  # ----------------------------------------------------------
  # API FastAPI — prédiction par cycle
  # ----------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: maintenance_api
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATA_RAW_DIR: /app/data/raw
      DATA_PROCESSED_DIR: /app/data/processed
      MODELS_DIR: /app/models
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-maintenance-predictive}
      RANDOM_STATE: ${RANDOM_STATE:-42}
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models:ro
    depends_on:
      mlflow:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ----------------------------------------------------------
  # MLflow — tracking des expériences + registry des modèles
  # ----------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.11.1
    container_name: maintenance_mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow-db:/mlflow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ----------------------------------------------------------
  # Prometheus — scraping des métriques
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: maintenance_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  # ----------------------------------------------------------
  # Grafana — dashboards
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.2
    container_name: maintenance_grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  mlflow-db:
  prometheus-data:
  grafana-data:
